<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haxtos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: #5c7b41;
      background-image: repeating-linear-gradient(45deg, #5c7b41, #5c7b41 40px, #6c8c4f 40px, #6c8c4f 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas { 
      display: none; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border-radius: 4px;
    }

    /* Input text style */
    input[type="text"] {
      border: 1px solid #2d3748;
      background: #14161d;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #4a5568;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <div id="_haxNavBar" style="position: fixed; top: 0; left: 0; right: 0; height: 40px; background: #0d0d0d; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10000; font-family: Arial, sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.5); user-select: none;">
    <div style="display: flex; align-items: center; height: 100%;">
      <span style="color: #fff; font-weight: bold; font-size: 15px; background: #1a2b4c; padding: 0 15px; height: 100%; display: flex; align-items: center; border-bottom: 2px solid #3182ce; cursor: pointer;" onclick="window.location.reload()">Haxtos</span>
      <span style="color: #888; font-size: 13px; margin-left: 18px; cursor: pointer;" onclick="alert('News: Haxtos 2.0 implementation complete!')">News</span>
      <span style="color: #fff; font-size: 13px; margin-left: 18px; cursor: pointer; font-weight: bold;" onclick="window.location.reload()">Play</span>
      <span style="color: #888; font-size: 13px; margin-left: 18px; cursor: pointer;" onclick="alert('Haxtos - A clone of Haxball')">About</span>
      <span style="color: #888; font-size: 13px; margin-left: 18px; cursor: pointer;" onclick="alert('Join the community!')">Community</span>
    </div>
    <div id="_haxNickDisplay" style="color: #fff; font-size: 13px; display: none; align-items: center; gap: 8px;">
      <span>Nick: <strong id="_haxNickVal" style="color: #e53e3e;"></strong></span>
      <button style="background: #4a5568; border: 1px solid #5a6578; color: #fff; padding: 2px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; font-weight: bold;" onclick="changeNickname()">Change</button>
    </div>
  </div>

  <!-- Nickname Dialog Overlay -->
  <div id="_haxNickOverlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; z-index: 10010; background: transparent; user-select: none;">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
      <!-- Haxtos Styled Logo -->
      <div style="display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; user-select: none;">
        <div style="font-size: 60px; font-family: 'Arial Black', sans-serif; font-weight: 900; letter-spacing: -3px; display: flex; align-items: center;">
          <!-- Hax (Red letters with white border and black outline) -->
          <span style="color: #ff3333; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 4px 4px 0 #000, -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000; transform: rotate(-5deg); display: inline-block;">Hax</span>
          <!-- Soccer Ball instead of the 't' -->
          <span style="font-size: 54px; margin: 0 -5px; filter: drop-shadow(4px 4px 0px #000); transform: rotate(10deg); display: inline-block;">⚽</span>
          <!-- tos (Blue letters with white border and black outline) -->
          <span style="color: #3388ff; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 4px 4px 0 #000, -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000; transform: rotate(5deg); display: inline-block;">tos</span>
        </div>
        <!-- Yellow Star floating on the top-right -->
        <span style="font-size: 32px; position: absolute; top: -15px; right: -25px; transform: rotate(20deg); filter: drop-shadow(2px 2px 0px #000);">⭐</span>
      </div>
      
      <!-- Box -->
      <div style="background: #1a202c; border: 1px solid #2d3748; border-radius: 4px; width: 280px; padding: 12px 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-family: Arial, sans-serif;">
        <div style="color: #fff; font-size: 14px; font-weight: bold; font-family: Verdana;">Choose nickname</div>
        <div style="height: 2px; background: #e53e3e; margin-top: 5px; margin-bottom: 12px;"></div>
        <div style="display: flex; align-items: center; gap: 8px;">
          <span style="color: #cbd5e0; font-size: 13px;">Nick:</span>
          <input type="text" id="_haxNickInput" maxlength="15" style="flex: 1; background: #14161d; border: 1px solid #2d3748; color: #fff; padding: 4px 8px; border-radius: 3px; font-size: 13px; font-weight: bold; outline: none;" />
        </div>
        <div style="display: flex; justify-content: center; margin-top: 14px;">
          <button id="_haxNickSubmit" style="background: #4a5568; border: 1px solid #5a6578; color: #fff; padding: 5px 24px; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 3px;">Ok</button>
        </div>
      </div>
    </div>
  </div>

  </div>

  <!-- Room List Overlay -->
  <div id="_haxRoomListOverlay" style="position: fixed; top: 40px; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; z-index: 10005; background: transparent; user-select: none;">
    <div style="background: #1a202c; border: 1px solid #2d3748; border-radius: 4px; width: 780px; max-width: 95vw; height: 490px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); display: flex; flex-direction: column; font-family: Arial, sans-serif;">
      <!-- Header -->
      <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #2d3748; border-top-left-radius: 3px; border-top-right-radius: 3px;">
        <span style="color: #fff; font-size: 14px; font-weight: bold; font-family: Verdana;">Room list</span>
        <span id="_haxRoomCount" style="color: #a0aec0; font-size: 11px;">0 players in 0 rooms</span>
      </div>
      <div style="height: 2px; background: #e53e3e;"></div>

      <!-- Content Layout: Left Table, Right Buttons -->
      <div style="display: flex; flex: 1; padding: 12px; gap: 12px; background: #1a202c; min-height: 0;">
        <!-- Left Column: Table -->
        <div style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
          <div style="color: #a0aec0; font-size: 12px; font-style: italic; margin-bottom: 8px;">Tip: Join rooms near you to reduce lag.</div>
          
          <!-- Table Header -->
          <div style="display: flex; padding: 6px 10px; background: #2d3748; color: #cbd5e0; font-size: 11px; font-weight: bold; border-top-left-radius: 3px; border-top-right-radius: 3px;">
            <div style="flex: 3; text-align: left;">Name</div>
            <div style="width: 70px; text-align: center;">Players</div>
            <div style="width: 60px; text-align: center;">Pass</div>
            <div style="width: 100px; text-align: right;">Distance</div>
          </div>

          <!-- Table Body (Scrollable list) -->
          <div id="_haxRoomTableBody" style="flex: 1; background: #14161d; border: 1px solid #2d3748; overflow-y: auto; display: flex; flex-direction: column;">
            <!-- Rooms populated dynamically -->
          </div>

          <!-- Checkboxes below table -->
          <div style="display: flex; gap: 15px; padding: 6px 4px 0 4px; color: #cbd5e0; font-size: 11px; align-items: center;">
            <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
              <input type="checkbox" id="_haxShowLocked" checked style="cursor: pointer;" /> Show locked
            </label>
            <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
              <input type="checkbox" id="_haxShowFull" checked style="cursor: pointer;" /> Show full
            </label>
            <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
              <input type="checkbox" id="_haxShowEmpty" checked style="cursor: pointer;" /> Show empty
            </label>
          </div>
        </div>

        <!-- Right Column: Buttons -->
        <div style="width: 150px; display: flex; flex-direction: column; gap: 6px;">
          <button id="_haxBtnRefresh" style="background: #2b6cb0; border: 1px solid #3182ce; color: #fff; padding: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: left;">⟳ Refresh</button>
          <button id="_haxBtnJoinId" style="background: #1f3a52; border: 1px solid #2b4e6f; color: #fff; padding: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: left;">➔ Join Room</button>
          <button id="_haxBtnCreate" style="background: #1f3a52; border: 1px solid #2b4e6f; color: #fff; padding: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: left;">✚ Create Room</button>
          
          <div style="flex: 1;"></div> <!-- Spacer -->

          <button id="_haxBtnBack" style="background: #718096; border: 1px solid #4a5568; color: #fff; padding: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: left;">◀ Back</button>
          <button onclick="alert('Options coming soon!')" style="background: #2b6cb0; border: 1px solid #3182ce; color: #fff; padding: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: left;">⚙ Settings</button>
          <button onclick="changeNickname()" style="background: #2b6cb0; border: 1px solid #3182ce; color: #fff; padding: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: left;">👤 Change Nick</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Room Dialog Modal Overlay -->
  <div id="_haxCreateRoomDialog" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10007; font-family:Arial, sans-serif; user-select:none;">
    <div style="background:#1a202c; border:1px solid #2d3748; border-radius:4px; width:300px; padding:15px; box-shadow:0 10px 25px rgba(0,0,0,0.6); display:flex; flex-direction:column; gap:10px;">
      <div style="color:#fff; font-size:14px; font-weight:bold; font-family:Verdana;">Create Room</div>
      <div style="height:2px; background:#e53e3e; margin-bottom:4px;"></div>
      
      <div style="display:flex; flex-direction:column; gap:4px;">
        <span style="color:#cbd5e0; font-size:12px;">Room Name:</span>
        <input type="text" id="_haxCreateRoomName" style="background:#14161d; border:1px solid #2d3748; color:#fff; padding:4px 8px; border-radius:3px; font-size:12px; outline:none;" />
      </div>

      <div style="display:flex; flex-direction:column; gap:4px;">
        <span style="color:#cbd5e0; font-size:12px;">Password (optional):</span>
        <input type="text" id="_haxCreateRoomPass" style="background:#14161d; border:1px solid #2d3748; color:#fff; padding:4px 8px; border-radius:3px; font-size:12px; outline:none;" />
      </div>

      <div style="display:flex; justify-content:space-between; gap:10px; margin-top:8px;">
        <button id="_haxCreateSubmit" style="flex:1; background:#48bb78; border:none; color:#fff; padding:6px; font-size:12px; font-weight:bold; cursor:pointer; border-radius:3px;">Create</button>
        <button id="_haxCreateCancel" style="background:#4a5568; border:none; color:#fff; padding:6px 12px; font-size:12px; cursor:pointer; border-radius:3px;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Join Room Dialog Modal Overlay -->
  <div id="_haxJoinRoomDialog" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10007; font-family:Arial, sans-serif; user-select:none;">
    <div style="background:#1a202c; border:1px solid #2d3748; border-radius:4px; width:280px; padding:15px; box-shadow:0 10px 25px rgba(0,0,0,0.6); display:flex; flex-direction:column; gap:10px;">
      <div style="color:#fff; font-size:14px; font-weight:bold; font-family:Verdana;">Join Room by ID</div>
      <div style="height:2px; background:#e53e3e; margin-bottom:4px;"></div>
      
      <div style="display:flex; flex-direction:column; gap:4px;">
        <span style="color:#cbd5e0; font-size:12px;">Room Code:</span>
        <input type="text" id="_haxJoinRoomCode" maxlength="4" placeholder="CODE" style="background:#14161d; border:1px solid #2d3748; color:#fff; padding:6px 8px; border-radius:3px; font-size:14px; text-align:center; font-family:monospace; font-weight:bold; outline:none; text-transform:uppercase;" />
      </div>

      <div style="display:flex; justify-content:space-between; gap:10px; margin-top:8px;">
        <button id="_haxJoinSubmit" style="flex:1; background:#2b6cb0; border:none; color:#fff; padding:6px; font-size:12px; font-weight:bold; cursor:pointer; border-radius:3px;">Join</button>
        <button id="_haxJoinCancel" style="background:#4a5568; border:none; color:#fff; padding:6px 12px; font-size:12px; cursor:pointer; border-radius:3px;">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let listWs = null;
    let selectedRoomCode = null;

    function checkNickname() {
      const nick = localStorage.getItem('haxNickname');
      const overlay = document.getElementById('_haxNickOverlay');
      const nickDisplay = document.getElementById('_haxNickDisplay');
      const nickVal = document.getElementById('_haxNickVal');
      const input = document.getElementById('_haxNickInput');
      const canvas = document.querySelector('canvas');
      
      if (!nick) {
        overlay.style.display = 'flex';
        nickDisplay.style.display = 'none';
        if (canvas) canvas.style.display = 'none';
        input.focus();
      } else {
        overlay.style.display = 'none';
        nickDisplay.style.display = 'flex';
        nickVal.textContent = nick;
        window.haxNickname = nick;
        // Only show canvas if Room List is not open
        const listOverlay = document.getElementById('_haxRoomListOverlay');
        if (canvas && listOverlay && listOverlay.style.display !== 'flex') {
          canvas.style.display = 'block';
        }
      }
    }

    function changeNickname() {
      localStorage.removeItem('haxNickname');
      hideHaxRoomList();
      checkNickname();
    }

    function showHaxRoomList() {
      document.getElementById('_haxRoomListOverlay').style.display = 'flex';
      const canvas = document.querySelector('canvas');
      if (canvas) canvas.style.display = 'none';
      refreshRoomList();
    }

    function hideHaxRoomList() {
      document.getElementById('_haxRoomListOverlay').style.display = 'none';
      const canvas = document.querySelector('canvas');
      if (canvas && localStorage.getItem('haxNickname')) {
        canvas.style.display = 'block';
      }
      if (listWs) {
        listWs.close();
        listWs = null;
      }
      // Return Phaser to MenuScene if active
      if (window.game && window.game.scene) {
        const activeScene = window.game.scene.scenes.find(s => s.scene.isActive());
        if (activeScene && activeScene.scene.key !== 'MenuScene') {
          window.game.scene.start('MenuScene');
        }
      }
    }

    function refreshRoomList() {
      const body = document.getElementById('_haxRoomTableBody');
      body.innerHTML = '<div style="color: #cbd5e0; text-align: center; padding-top: 80px; font-size: 13px; font-family: Arial;">Loading active rooms...</div>';

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const host = isLocal ? location.host : 'haxtos.onrender.com';

      if (listWs) {
        try { listWs.close(); } catch(e) {}
      }
      
      listWs = new WebSocket(`${proto}//${host}`);

      listWs.onopen = () => {
        listWs.send(JSON.stringify({ type: 'list_rooms' }));
      };

      listWs.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'room_list') {
            renderRooms(msg.list);
            document.getElementById('_haxRoomCount').textContent = 
              `${msg.totalPlayers} players in ${msg.totalRooms} rooms`;
          }
        } catch(e) {}
      };

      listWs.onerror = () => {
        body.innerHTML = '<div style="color: #f56565; text-align: center; padding-top: 80px; font-size: 13px; font-family: Arial;">Failed to connect to lobby server.</div>';
      };
    }

    function renderRooms(list) {
      const body = document.getElementById('_haxRoomTableBody');
      body.innerHTML = '';
      selectedRoomCode = null;

      // Filter rooms based on checkboxes
      const showLocked = document.getElementById('_haxShowLocked').checked;
      const showFull = document.getElementById('_haxShowFull').checked;
      const showEmpty = document.getElementById('_haxShowEmpty').checked;

      const filtered = list.filter(r => {
        if (r.hasPass && !showLocked) return false;
        if (r.players >= 2 && !showFull) return false;
        if (r.players === 0 && !showEmpty) return false;
        return true;
      });

      if (filtered.length === 0) {
        body.innerHTML = '<div style="color: #556688; text-align: center; padding-top: 80px; font-size: 13px; font-family: Arial;">No active rooms found. Click Create Room to start hosting!</div>';
        return;
      }

      filtered.forEach((room, index) => {
        const row = document.createElement('div');
        row.style.cssText = 'display: flex; padding: 8px 10px; color: #fff; font-size: 12px; border-bottom: 1px solid #2d3748; cursor: pointer; align-items: center; font-family: Arial, sans-serif;';
        
        // Random distance to look authentic
        const distances = ['110km', '180km', '230km', '320km', '450km', '520km'];
        const randDist = distances[index % distances.length];
        
        row.innerHTML = `
          <div style="flex: 3; text-align: left; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${room.name}</div>
          <div style="width: 70px; text-align: center; color: #cbd5e0;">${room.players}/2</div>
          <div style="width: 60px; text-align: center; color: #cbd5e0;">${room.hasPass ? '🔒 Yes' : 'No'}</div>
          <div style="width: 100px; text-align: right; color: #a0aec0;">🇦🇷 ${randDist}</div>
        `;

        row.onclick = () => {
          // Deselect previous
          const children = body.children;
          for (let c of children) {
            c.style.background = '';
          }
          row.style.background = '#2b6cb0';
          selectedRoomCode = room.code;
        };

        row.ondblclick = () => {
          joinRoomWithCode(room.code);
        };

        body.appendChild(row);
      });
    }

    function joinRoomWithCode(code) {
      if (!code || code.length !== 4) return;
      
      // Close overlays and start Phaser client connection
      document.getElementById('_haxRoomListOverlay').style.display = 'none';
      document.getElementById('_haxJoinRoomDialog').style.display = 'none';
      if (listWs) {
        listWs.close();
        listWs = null;
      }

      const canvas = document.querySelector('canvas');
      if (canvas) canvas.style.display = 'block';

      if (window.game && window.game.scene) {
        const onlineScene = window.game.scene.keys['OnlineScene'];
        if (onlineScene) {
          onlineScene.roomCode = code.toUpperCase();
          onlineScene.autoJoin = true;
          window.game.scene.start('OnlineScene');
        }
      }
    }

    function createRoomWithParams(name, pass) {
      const charOpts = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
      let code = '';
      for (let i = 0; i < 4; i++) {
        code += charOpts[Math.floor(Math.random() * charOpts.length)];
      }

      document.getElementById('_haxRoomListOverlay').style.display = 'none';
      document.getElementById('_haxCreateRoomDialog').style.display = 'none';
      if (listWs) {
        listWs.close();
        listWs = null;
      }

      const canvas = document.querySelector('canvas');
      if (canvas) canvas.style.display = 'block';

      if (window.game && window.game.scene) {
        const onlineScene = window.game.scene.keys['OnlineScene'];
        if (onlineScene) {
          onlineScene.roomCode = code;
          onlineScene.autoJoin = true;
          // Inject custom room name and password directly into connection handler payload
          const originalJoin = onlineScene._joinRoom;
          onlineScene._joinRoom = function() {
            if (this.waiting) return;
            this.waiting = true;
            this.status.setText('Conectando...');
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            const host = isLocal ? location.host : 'haxtos.onrender.com';
            this.ws = new WebSocket(`${proto}//${host}`);
            this.ws.onopen = () => {
              const nick = localStorage.getItem('haxNickname') || '';
              this.ws.send(JSON.stringify({ 
                type: 'join', 
                room: this.roomCode, 
                name: nick,
                roomName: name || `${nick}'s room`,
                password: pass || ''
              }));
            };
            this.ws.onmessage = originalJoin.bind(this).prototype || ((ev) => {
              // Standard message routing
              const msg = JSON.parse(ev.data);
              if (msg.type === 'joined') {
                this.playerIndex = msg.index;
                this.status.setText(`Sala ${this.roomCode} — Esperando rival...`);
              }
              if (msg.type === 'start') {
                this.status.setText('¡Rival conectado!');
                this.time.delayedCall(500, () => {
                  this.scene.start('GameScene', {
                    mode: 'online',
                    ws: this.ws,
                    playerIndex: msg.index,
                    roomCode: this.roomCode
                  });
                });
              }
              if (msg.type === 'error') {
                this.status.setText(msg.text);
                this.waiting = false;
                this.ws.close();
              }
              if (msg.type === 'opponent_left') {
                this.status.setText('El rival se desconectó');
                this.waiting = false;
              }
            });
            this.ws.onclose = () => {
              if (!this.waiting) return;
              this.status.setText('Conexión cerrada');
              this.waiting = false;
            };
          };
          window.game.scene.start('OnlineScene');
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkNickname();
      
      const submit = document.getElementById('_haxNickSubmit');
      const input = document.getElementById('_haxNickInput');
      
      const doSubmit = () => {
        const val = input.value.trim();
        if (val.length > 0) {
          localStorage.setItem('haxNickname', val);
          checkNickname();
          if (window.game && window.game.scene) {
            const menuScene = window.game.scene.keys['MenuScene'];
            if (menuScene && menuScene.scene.isActive()) {
              menuScene.scene.restart();
            }
          }
        }
      };

      submit.onclick = doSubmit;
      input.onkeydown = (e) => {
        if (e.key === 'Enter') doSubmit();
      };

      // Room list buttons bindings
      document.getElementById('_haxBtnRefresh').onclick = refreshRoomList;
      document.getElementById('_haxBtnBack').onclick = hideHaxRoomList;

      document.getElementById('_haxShowLocked').onchange = () => {
        if (listWs && listWs.readyState === 1) listWs.send(JSON.stringify({ type: 'list_rooms' }));
      };
      document.getElementById('_haxShowFull').onchange = () => {
        if (listWs && listWs.readyState === 1) listWs.send(JSON.stringify({ type: 'list_rooms' }));
      };
      document.getElementById('_haxShowEmpty').onchange = () => {
        if (listWs && listWs.readyState === 1) listWs.send(JSON.stringify({ type: 'list_rooms' }));
      };

      // Join Room modal bindings
      document.getElementById('_haxBtnJoinId').onclick = () => {
        document.getElementById('_haxJoinRoomDialog').style.display = 'flex';
        document.getElementById('_haxJoinRoomCode').value = '';
        document.getElementById('_haxJoinRoomCode').focus();
      };
      document.getElementById('_haxJoinCancel').onclick = () => {
        document.getElementById('_haxJoinRoomDialog').style.display = 'none';
      };
      document.getElementById('_haxJoinSubmit').onclick = () => {
        const code = document.getElementById('_haxJoinRoomCode').value.trim();
        if (code.length === 4) {
          joinRoomWithCode(code);
        }
      };
      document.getElementById('_haxJoinRoomCode').onkeydown = (e) => {
        if (e.key === 'Enter') {
          const code = e.target.value.trim();
          if (code.length === 4) joinRoomWithCode(code);
        }
      };

      // Create Room modal bindings
      document.getElementById('_haxBtnCreate').onclick = () => {
        document.getElementById('_haxCreateRoomDialog').style.display = 'flex';
        const nick = localStorage.getItem('haxNickname') || 'Player';
        document.getElementById('_haxCreateRoomName').value = `${nick}'s room`;
        document.getElementById('_haxCreateRoomPass').value = '';
        document.getElementById('_haxCreateRoomName').focus();
      };
      document.getElementById('_haxCreateCancel').onclick = () => {
        document.getElementById('_haxCreateRoomDialog').style.display = 'none';
      };
      document.getElementById('_haxCreateSubmit').onclick = () => {
        const name = document.getElementById('_haxCreateRoomName').value.trim();
        const pass = document.getElementById('_haxCreateRoomPass').value.trim();
        createRoomWithParams(name, pass);
      };

      // Periodic check in case canvas loads late
      const interval = setInterval(() => {
        const canvas = document.querySelector('canvas');
        if (canvas) {
          const nick = localStorage.getItem('haxNickname');
          canvas.style.display = nick ? 'block' : 'none';
          clearInterval(interval);
        }
      }, 100);
    });
  </script>
